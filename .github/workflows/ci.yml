name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  gls:
    name: Groovy Language Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build & Test with Coverage
        run: ./gradlew :org.eclipse.groovy.ls.core:test :org.eclipse.groovy.ls.core:jacocoTestReport

      - name: Generate Java Coverage Badge
        id: jacoco
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: org.eclipse.groovy.ls.core/build/reports/jacoco/test/jacocoTestReport.csv
          badges-directory: .badges
          coverage-badge-filename: gls-coverage.svg
          branches-badge-filename: gls-branches.svg
          generate-branches-badge: true
          coverage-label: Java coverage
          branches-label: Java branches

      - name: Generate Java Coverage JSON for shields.io
        run: |
          RAW_COVERAGE=$(echo "${{ steps.jacoco.outputs.coverage }}" | sed 's/%//')
          if (( $(echo "$RAW_COVERAGE <= 1" | bc -l) )); then
            RAW_COVERAGE=$(echo "$RAW_COVERAGE * 100" | bc -l)
          fi
          COVERAGE=$(printf "%.2f" "$RAW_COVERAGE")
          COLOR="red"
          if (( $(echo "$COVERAGE >= 90" | bc -l) )); then COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 80" | bc -l) )); then COLOR="green"
          elif (( $(echo "$COVERAGE >= 70" | bc -l) )); then COLOR="yellowgreen"
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then COLOR="yellow"
          elif (( $(echo "$COVERAGE >= 50" | bc -l) )); then COLOR="orange"
          fi
          cat > .badges/gls-coverage.json << EOF
          {
            "schemaVersion": 1,
            "label": "Java coverage",
            "message": "${COVERAGE}%",
            "color": "${COLOR}"
          }
          EOF

      - name: Verify GLS badges exist
        run: |
          echo "Checking badge files..."
          ls -la .badges/
          test -f .badges/gls-coverage.svg
          test -f .badges/gls-branches.svg
          test -f .badges/gls-coverage.json
          echo "All badge files present"

      - name: Upload GLS badges
        uses: actions/upload-artifact@v4
        with:
          name: badges-gls
          path: .badges
          if-no-files-found: error
          include-hidden-files: true

      - name: Upload GLS test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gls-test-results
          path: |
            org.eclipse.groovy.ls.core/build/reports/tests/test/
            org.eclipse.groovy.ls.core/build/reports/jacoco/test/html/

  extension:
    name: VS Code Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Run unit test coverage
        working-directory: vscode-extension
        run: npm run test:coverage

      - name: Generate TypeScript coverage JSON for shields.io
        working-directory: vscode-extension
        run: |
          mkdir -p .badges
          node <<'EOF'
          const fs = require('node:fs');
          const path = require('node:path');

          const summaryPath = path.join(process.cwd(), 'coverage', 'coverage-summary.json');
          const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
          const coverage = Number(summary.total.lines.pct ?? 0).toFixed(2);
          const numericCoverage = Number(coverage);
          let color = 'red';

          if (numericCoverage >= 90) {
            color = 'brightgreen';
          } else if (numericCoverage >= 80) {
            color = 'green';
          } else if (numericCoverage >= 70) {
            color = 'yellowgreen';
          } else if (numericCoverage >= 60) {
            color = 'yellow';
          } else if (numericCoverage >= 50) {
            color = 'orange';
          }

          fs.writeFileSync(
            path.join(process.cwd(), '.badges', 'typescript-coverage.json'),
            JSON.stringify(
              {
                schemaVersion: 1,
                label: 'TypeScript coverage',
                message: `${coverage}%`,
                color,
              },
              null,
              2
            ) + '\n'
          );
          EOF

      - name: Upload Extension coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extension-coverage
          path: vscode-extension/coverage/
          if-no-files-found: error

      - name: Verify TypeScript badge exists
        run: test -f vscode-extension/.badges/typescript-coverage.json

      - name: Upload TypeScript badge
        uses: actions/upload-artifact@v4
        with:
          name: badges-typescript
          path: vscode-extension/.badges/typescript-coverage.json
          if-no-files-found: error

      - name: Run Playwright tests
        working-directory: vscode-extension
        run: xvfb-run -a npm run test:playwright

      - name: Upload Extension test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extension-test-results
          path: vscode-extension/test-results/

      - name: Upload Playwright results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extension-playwright-results
          path: vscode-extension/playwright-results/
          if-no-files-found: ignore

  update-badges:
    name: Update Coverage Badges
    needs: [gls, extension]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Switch to badges branch
        run: |
          git checkout badges 2>/dev/null || git checkout --orphan badges
          git rm -rf . 2>/dev/null || true
          mkdir -p .badges

      - name: Download GLS badges
        uses: actions/download-artifact@v4
        with:
          name: badges-gls
          path: .badges/
        continue-on-error: false

      - name: Download TypeScript badge
        uses: actions/download-artifact@v4
        with:
          name: badges-typescript
          path: .badges/
        continue-on-error: false

      - name: Verify downloaded badges
        run: |
          echo "Listing downloaded badges..."
          ls -la .badges/
          test -f .badges/gls-coverage.json
          test -f .badges/typescript-coverage.json
          echo "Badge files downloaded successfully"

      - name: Push badges
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .badges/
          git diff --cached --quiet && echo "No badge changes" || {
            git commit -m "Update coverage badges [skip ci]"
            git push origin badges
          }
