name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  gls:
    name: Groovy Language Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build & Test with Coverage
        run: ./gradlew :org.eclipse.groovy.ls.core:test :org.eclipse.groovy.ls.core:jacocoTestReport

      - name: Generate GLS Coverage Badge
        id: jacoco
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: org.eclipse.groovy.ls.core/build/reports/jacoco/test/jacocoTestReport.csv
          badges-directory: .badges
          coverage-badge-filename: gls-coverage.svg
          branches-badge-filename: gls-branches.svg
          generate-branches-badge: true
          coverage-label: GLS Coverage
          branches-label: GLS Branches

      - name: Generate GLS Coverage JSON for shields.io
        run: |
          RAW_COVERAGE=$(echo "${{ steps.jacoco.outputs.coverage }}" | sed 's/%//')
          if (( $(echo "$RAW_COVERAGE <= 1" | bc -l) )); then
            RAW_COVERAGE=$(echo "$RAW_COVERAGE * 100" | bc -l)
          fi
          COVERAGE=$(printf "%.2f" "$RAW_COVERAGE")
          COLOR="red"
          if (( $(echo "$COVERAGE >= 90" | bc -l) )); then COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 80" | bc -l) )); then COLOR="green"
          elif (( $(echo "$COVERAGE >= 70" | bc -l) )); then COLOR="yellowgreen"
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then COLOR="yellow"
          elif (( $(echo "$COVERAGE >= 50" | bc -l) )); then COLOR="orange"
          fi
          cat > .badges/gls-coverage.json << EOF
          {
            "schemaVersion": 1,
            "label": "GLS Coverage",
            "message": "${COVERAGE}%",
            "color": "${COLOR}"
          }
          EOF

      - name: Verify GLS badges exist
        run: |
          echo "Checking badge files..."
          ls -la .badges/
          test -f .badges/gls-coverage.svg
          test -f .badges/gls-branches.svg
          test -f .badges/gls-coverage.json
          echo "All badge files present"

      - name: Upload GLS badges
        uses: actions/upload-artifact@v4
        with:
          name: badges-gls
          path: .badges
          if-no-files-found: error
          include-hidden-files: true

      - name: Upload GLS test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gls-test-results
          path: |
            org.eclipse.groovy.ls.core/build/reports/tests/test/
            org.eclipse.groovy.ls.core/build/reports/jacoco/test/html/

  extension:
    name: VS Code Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Run tests
        working-directory: vscode-extension
        run: npm test

      - name: Upload Extension test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extension-test-results
          path: vscode-extension/test-results/

  update-badges:
    name: Update Coverage Badges
    needs: [gls]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Switch to badges branch
        run: |
          git checkout badges 2>/dev/null || git checkout --orphan badges
          git rm -rf . 2>/dev/null || true
          mkdir -p .badges

      - name: Download GLS badges
        uses: actions/download-artifact@v4
        with:
          name: badges-gls
          path: .badges/
        continue-on-error: false

      - name: Verify downloaded badges
        run: |
          echo "Listing downloaded badges..."
          ls -la .badges/
          echo "Badge files downloaded successfully"

      - name: Push badges
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .badges/
          git diff --cached --quiet && echo "No badge changes" || {
            git commit -m "Update coverage badges [skip ci]"
            git push origin badges
          }
